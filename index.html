<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhinav Aby</title>
    <link rel="stylesheet" href="abhinav.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Animated background elements -->
        <div class="background-elements">
            <div class="gradient-blob blob-1"></div>
            <div class="gradient-blob blob-2"></div>
            <div class="gradient-blob blob-3"></div>
            <div class="animated-grid"></div>
        </div>

        <!-- Main card -->
        <div class="card">
            <!-- Top gradient border -->
            <div class="top-border"></div>

            <!-- Profile section -->
            <div class="profile-container">
                <div class="image-wrapper">
                    <div class="image-frame">
                        <img src="abhinav-2.JPG" alt="Abhinav Aby" class="profile-image">
                        <div class="image-glow"></div>
                    </div>
                    <div class="status-pill">AVAILABLE</div>
                </div>

                <h1 class="name">Abhinav Aby</h1>
                <p class="tagline">Creative Developer & Cloud Enthusiast</p>
            </div>

            <!-- Divider -->
            <div class="section-divider"></div>

            <!-- Social links section -->
            <div class="social-section">
                <div class="social-grid">
                    <a href="https://github.com/abhinavaby" class="social-link github-btn" title="GitHub">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                        </svg>
                    </a>
                    <a href="https://www.linkedin.com/in/abhinav-aby-ab04753a6/" class="social-link linkedin-btn" title="LinkedIn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.475-2.236-1.986-2.236-1.081 0-1.722.735-2.004 1.446-.103.25-.129.599-.129.949v5.41h-3.554s.048-8.773 0-9.672h3.554v1.371c.429-.661 1.196-1.6 2.905-1.6 2.121 0 3.71 1.388 3.71 4.369v5.532zM5.337 8.855c-1.144 0-1.915-.759-1.915-1.71 0-.956.768-1.71 1.959-1.71 1.19 0 1.916.754 1.94 1.71 0 .951-.75 1.71-1.984 1.71zm1.581 11.597H3.735V9.98h3.183v10.472zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"></path>
                        </svg>
                    </a>
                    <a href="https://www.instagram.com/abhinav_aby_01/" class="social-link instagram-btn" title="Instagram">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <circle cx="17.5" cy="6.5" r="1.5"></circle>
                        </svg>
                    </a>
                    <a href="mailto:abhinavaby07@gmail.com" class="social-link email-btn" title="Email">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </a>
                </div>
            </div>

            <!-- Action buttons section -->
            <div class="buttons-section">
                <a href="https://abhinavaby.github.io/Abhinav-Aby-portfolio/" class="btn btn-secondary">
                    <span>PORTFOLIO WEBSITE</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </a>
                <a href="tel:9400038410" class="btn btn-primary">
                    <span>Get in Touch</span>
                    <div class="button-glow"></div>
                </a>
            </div>

            <!-- Bottom border glow -->
            <div class="bottom-border"></div>
        </div>

        <!-- Floating particles -->
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>
</body>
</html>
